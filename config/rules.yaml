#
# Rule 6: invalid_class_format
#   Frequency: 14 of 206 files (6.9%) | 25 rows
#   CIBL_CLASS1 values not matching the standard 0000000XXX pattern
#   (some contain dates like 20251209, some are 3-digit codes)
#   Recommended action: flag for review
